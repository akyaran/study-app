<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>勉強アプリ</title>
    <link rel="stylesheet" href="styles.css?v=20260614-5">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="deckTitle">問題集</p>
          <h1 id="questionTitle">読み込み中</h1>
        </div>
        <div class="top-actions">
          <label class="file-button">
            読み込み
            <input type="file" id="deckFileInput" accept="application/json,.json">
          </label>
          <label class="question-picker">
            <span>問題</span>
            <select id="questionSelect" aria-label="問題を選ぶ"></select>
          </label>
          <div class="progress" aria-live="polite">
            <span id="currentNumber">0</span>/<span id="totalNumber">0</span>
          </div>
          <button type="button" class="secondary restart-button" id="restartButton">最初から</button>
        </div>
      </header>

      <section class="study-settings" aria-label="学習設定">
        <div class="mode-switch" role="radiogroup" aria-label="学習モード">
          <button type="button" class="mode-button active" id="sequentialModeButton" data-mode="sequential" aria-pressed="true">順番</button>
          <button type="button" class="mode-button" id="adaptiveModeButton" data-mode="adaptive" aria-pressed="false">復習優先</button>
        </div>
        <div class="category-panel">
          <div class="panel-row">
            <strong>カテゴリ切替</strong>
            <span class="category-current" id="currentCategoryLabel">未選択</span>
          </div>
          <div class="category-list" id="categoryList"></div>
        </div>
      </section>

      <section class="viewer" aria-live="polite">
        <div class="meta-row">
          <span class="badge" id="subjectBadge">科目</span>
          <span class="muted" id="pageMode">問題</span>
        </div>

        <div class="content-stack" id="contentArea"></div>

        <div class="reveal-panel" id="hintPanel" hidden>
          <div class="panel-heading">ヒント</div>
          <div id="hintArea"></div>
        </div>

        <div class="reveal-panel" id="explanationPanel" hidden>
          <div class="panel-heading">解説</div>
          <div id="explanationArea"></div>
        </div>

        <section class="grading-panel" id="gradingPanel" hidden>
          <div>
            <div class="panel-heading">自己採点</div>
            <p class="grading-note" id="gradingNote">紙に書いた答えを見直して、でき具合を選んでください。</p>
          </div>
          <div class="grade-buttons" id="gradeButtons">
            <button type="button" class="grade again" data-grade="again">Again</button>
            <button type="button" class="grade hard" data-grade="hard">Hard</button>
            <button type="button" class="grade good" data-grade="good">Good</button>
            <button type="button" class="grade easy" data-grade="easy">Easy</button>
          </div>
          <p class="saved-note" id="savedNote" hidden></p>
        </section>
      </section>

      <section class="history-panel" aria-label="今日の学習履歴">
        <details id="historyDetails">
          <summary>
            <span>今日の履歴</span>
            <span class="history-count" id="todayCount">0回</span>
          </summary>
          <div class="history-actions">
            <button type="button" class="secondary small-button" id="exportLearningButton">エクスポート</button>
            <label class="secondary small-button import-button">
              インポート
              <input type="file" id="importLearningInput" accept="application/json,.json">
            </label>
          </div>
          <div class="history-summary" id="historySummary"></div>
          <div class="history-log" id="historyLog"></div>
        </details>
      </section>

      <nav class="controls" aria-label="問題操作">
        <button type="button" class="icon-button" id="prevButton" aria-label="前の問題" title="前の問題">
          <span aria-hidden="true">&lsaquo;</span>
        </button>
        <button type="button" class="secondary" id="hintButton">ヒント</button>
        <button type="button" class="primary" id="toggleAnswerButton">解答へ</button>
        <button type="button" class="secondary" id="explanationButton">解説</button>
        <button type="button" class="icon-button" id="nextButton" aria-label="次の問題" title="次の問題">
          <span aria-hidden="true">&rsaquo;</span>
        </button>
      </nav>
    </main>

    <script src="questions-data.js?v=20260614-5"></script>
    <script src="app.js?v=20260614-5"></script>
  </body>
</html>
