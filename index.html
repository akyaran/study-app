<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>勉強アプリ</title>
<style>
body{margin:0;background:#f6f4ef;color:#22201d;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{width:min(980px,100%);min-height:100vh;margin:auto;padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}.top,.viewer,.controls{background:#fffdf8;border:1px solid #ded8cc;border-radius:8px;box-shadow:0 18px 50px rgba(52,45,35,.12)}.top{padding:16px;display:flex;justify-content:space-between;gap:12px}.top p{margin:0 0 4px;color:#6f6a61;font-weight:700}.top h1{margin:0;font-size:clamp(1.25rem,3vw,2rem)}.count{padding:10px 12px;border-radius:8px;background:#ebe5d8;font-weight:800}.viewer{padding:18px;overflow:auto}.meta{display:flex;justify-content:space-between;color:#6f6a61;font-weight:700;margin-bottom:14px}.badge{padding:5px 10px;border-radius:999px;background:#e4efe9;color:#174d43}.stack{display:grid;gap:14px}.text{margin:0;font-size:clamp(1.08rem,2.2vw,1.35rem);line-height:1.75;white-space:pre-wrap}.math{padding:14px;border:1px solid #cbd8d2;border-left:6px solid #236b5d;border-radius:8px;background:#f8fbf9;font-family:Consolas,monospace;font-size:clamp(1.25rem,4vw,2rem);font-weight:800;white-space:pre;overflow:auto}.study-image{width:100%;max-height:58vh;object-fit:contain;border:1px solid #ded8cc;border-radius:8px;background:white}.panel{margin-top:16px;padding:14px;border:1px solid #ead4bf;border-radius:8px;background:#fff7ed}.panel-title{margin-bottom:8px;color:#8a451f;font-weight:900}.controls{position:sticky;bottom:10px;padding:10px;display:grid;grid-template-columns:52px 1fr 1.2fr 1fr 52px;gap:8px}button{min-height:48px;border:0;border-radius:8px;font:inherit;font-weight:800}.primary{background:#236b5d;color:white}.secondary{background:#ebe5d8}.icon{background:#22201d;color:white;font-size:1.8rem}button:disabled{opacity:.4}@media(max-width:680px){.app{padding:10px}.top{flex-direction:column}.controls{grid-template-columns:46px 1fr 1fr 46px}.explain{grid-column:2/4}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><p>小学4年生 算数</p><h1 id="title"></h1></div><div class="count"><span id="now">1</span>/<span id="total">5</span></div></header>
<section class="viewer"><div class="meta"><span class="badge">わり算</span><span id="mode">問題</span></div><div class="stack" id="content"></div><div class="panel" id="hintPanel" hidden><div class="panel-title">ヒント</div><div class="stack" id="hint"></div></div><div class="panel" id="expPanel" hidden><div class="panel-title">解説</div><div class="stack" id="exp"></div></div></section>
<nav class="controls"><button class="icon" id="prev">‹</button><button class="secondary" id="hintBtn">ヒント</button><button class="primary" id="answerBtn">解答へ</button><button class="secondary explain" id="expBtn">解説</button><button class="icon" id="next">›</button></nav>
</main>
<script>
const questions=[
{title:'筆算のあなうめ 45 ÷ 6',prompt:[{type:'text',value:'□にあてはまる数を書きましょう。'},{type:'image',src:'images/page9-division-45-6-web.jpg',alt:'45割る6の筆算の穴埋め問題'}],hints:[{type:'text',value:'商は7です。6×7で42が作れます。あまりは45-42で考えます。'}],answer:[{type:'text',value:'6×7=42、45-42=3 なので、□は 6、7、45、42 です。'}],explanation:[{type:'text',value:'わる数×商を先に書きます。6×7=42。次に、わられる数45から42を引いて、あまり3を求めます。'}]},
{title:'筆算のあなうめ 64 ÷ 8',prompt:[{type:'text',value:'□にあてはまる数を書きましょう。'},{type:'image',src:'images/page9-division-64-8-web.jpg',alt:'64割る8の筆算の穴埋め問題'}],hints:[{type:'text',value:'64は8の段にあります。8×いくつで64になるか考えましょう。'}],answer:[{type:'text',value:'8×8=64、64-64=0 なので、□は 8、8、64、64 です。'}],explanation:[{type:'text',value:'8×8=64だから商は8です。64から64を引くので、あまりは0になります。'}]},
{title:'たしかめ算のあなうめ',prompt:[{type:'text',value:'61 ÷ 9 = 6 あまり 7 の答えは、9×□+□=□ でたしかめられます。□に入る数を書きましょう。'}],hints:[{type:'text',value:'たしかめ算は、わる数×商+あまり=わられる数 です。'}],answer:[{type:'math',value:'9 × 6 + 7 = 61'}],explanation:[{type:'text',value:'9×6=54。54+7=61になるので、答えが正しいとたしかめられます。'}]},
{title:'チョコレートを分ける問題',prompt:[{type:'text',value:'27このチョコレートを一皿に3こずつ分けます。皿は何まいいるでしょうか。筆算とたしかめも書きましょう。'}],hints:[{type:'text',value:'27を3ずつに分けるので、27÷3を考えます。'}],answer:[{type:'math',value:'27 ÷ 3 = 9\n答え 9まい'}],explanation:[{type:'text',value:'3×9=27なので、9皿に分けるとちょうど全部使えます。たしかめは3×9=27です。'}]},
{title:'あめを7人に分ける問題',prompt:[{type:'text',value:'65このあめがあります。同じ数ずつ7人に分けます。1人分は何こになるでしょうか。また、あまりはいくつでしょうか。筆算とたしかめも書きましょう。'}],hints:[{type:'text',value:'65÷7を考えます。7の段で65をこえない一番大きい数を探しましょう。'}],answer:[{type:'math',value:'65 ÷ 7 = 9 あまり 2\n答え 1人分は9こ、あまり2こ'}],explanation:[{type:'text',value:'7×9=63で、65をこえません。65-63=2なので、あまりは2です。たしかめは7×9+2=65です。'}]}
];
let index=0,showAnswer=false,showHint=false,showExp=false;const $=s=>document.querySelector(s);function blocks(el,bs){el.replaceChildren();bs.forEach(b=>{let n;if(b.type==='image'){n=document.createElement('img');n.className='study-image';n.src=b.src;n.alt=b.alt||'';}else{n=document.createElement('p');n.className=b.type==='math'?'math':'text';n.textContent=b.value||'';}el.append(n);});}function render(){const q=questions[index];$('#title').textContent=q.title;$('#now').textContent=index+1;$('#total').textContent=questions.length;$('#mode').textContent=showAnswer?'解答':'問題';blocks($('#content'),showAnswer?q.answer:q.prompt);blocks($('#hint'),q.hints||[]);blocks($('#exp'),q.explanation||[]);$('#hintPanel').hidden=!showHint;$('#expPanel').hidden=!showExp;$('#prev').disabled=index===0;$('#next').disabled=index===questions.length-1;$('#hintBtn').disabled=showAnswer;$('#answerBtn').textContent=showAnswer?'問題へ':'解答へ';}$('#prev').onclick=()=>{if(index>0){index--;showAnswer=showHint=showExp=false;render();}};$('#next').onclick=()=>{if(index<questions.length-1){index++;showAnswer=showHint=showExp=false;render();}};$('#hintBtn').onclick=()=>{showHint=!showHint;render();};$('#answerBtn').onclick=()=>{showAnswer=!showAnswer;showHint=false;render();};$('#expBtn').onclick=()=>{showExp=!showExp;render();};render();
</script>
</body>
</html>
