<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>勉強アプリ</title>
    <link rel="stylesheet" href="styles.css?v=20260614-1">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="deckTitle">問題集</p>
          <h1 id="questionTitle">読み込み中</h1>
        </div>
        <div class="top-actions">
          <label class="file-button">
            読み込み
            <input type="file" id="deckFileInput" accept="application/json,.json">
          </label>
          <label class="question-picker">
            <span>問題</span>
            <select id="questionSelect" aria-label="問題を選ぶ"></select>
          </label>
          <div class="progress" aria-live="polite">
            <span id="currentNumber">0</span>/<span id="totalNumber">0</span>
          </div>
        </div>
      </header>

      <section class="viewer" aria-live="polite">
        <div class="meta-row">
          <span class="badge" id="subjectBadge">科目</span>
          <span class="muted" id="pageMode">問題</span>
        </div>

        <div class="content-stack" id="contentArea"></div>

        <div class="reveal-panel" id="hintPanel" hidden>
          <div class="panel-heading">ヒント</div>
          <div id="hintArea"></div>
        </div>

        <div class="reveal-panel" id="explanationPanel" hidden>
          <div class="panel-heading">解説</div>
          <div id="explanationArea"></div>
        </div>
      </section>

      <nav class="controls" aria-label="問題操作">
        <button type="button" class="icon-button" id="prevButton" aria-label="前の問題" title="前の問題">
          <span aria-hidden="true">&lsaquo;</span>
        </button>
        <button type="button" class="secondary" id="hintButton">ヒント</button>
        <button type="button" class="primary" id="toggleAnswerButton">解答へ</button>
        <button type="button" class="secondary" id="explanationButton">解説</button>
        <button type="button" class="icon-button" id="nextButton" aria-label="次の問題" title="次の問題">
          <span aria-hidden="true">&rsaquo;</span>
        </button>
      </nav>
    </main>

    <script src="questions-data.js?v=20260614-1"></script>
    <script src="app.js?v=20260614-1"></script>
  </body>
</html>
