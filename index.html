<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>勉強アプリ</title>
<style>
:root{--bg:#f6f4ef;--surface:#fffdf8;--ink:#22201d;--muted:#6f6a61;--line:#ded8cc;--accent:#236b5d}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{width:min(980px,100%);min-height:100vh;margin:0 auto;padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}.top,.viewer,.controls{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 38px rgba(52,45,35,.12)}.top{padding:16px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.deck{margin:0 0 4px;color:var(--muted);font-weight:800}.title{margin:0;font-size:clamp(1.25rem,3vw,2rem);line-height:1.25}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.progress,.picker{min-height:44px;padding:8px 10px;border-radius:8px;background:#ebe5d8;font-weight:800}.picker select{border:0;background:transparent;font:inherit;font-weight:800;max-width:190px}.viewer{padding:18px;overflow:auto}.meta{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px}.badge{padding:5px 10px;border-radius:999px;background:#e4efe9;color:#174d43;font-weight:900}.muted{color:var(--muted)}.stack{display:grid;gap:14px}.text{margin:0;font-size:clamp(1.08rem,2.2vw,1.35rem);line-height:1.75;white-space:pre-wrap}.math{padding:16px;border:1px solid #cbd8d2;border-left:6px solid var(--accent);border-radius:8px;background:#f8fbf9;font-family:"SF Mono",Consolas,"Courier New",monospace;font-size:clamp(1.2rem,3.6vw,2rem);font-weight:800;line-height:1.45;white-space:pre;overflow:auto}.figure{width:100%;max-height:58vh;border:1px solid var(--line);border-radius:8px;background:white}.caption{margin:-6px 0 0;color:var(--muted);font-size:.92rem}.panel{margin-top:18px;padding:16px;border:1px solid #ead4bf;border-radius:8px;background:#fff7ed}.panel-title{margin-bottom:8px;color:#8a451f;font-weight:900}.controls{position:sticky;bottom:10px;padding:10px;display:grid;grid-template-columns:52px 1fr 1.2fr 1fr 52px;gap:8px}button{min-height:48px;border:0;border-radius:8px;font:inherit;font-weight:800;touch-action:manipulation}.primary{background:var(--accent);color:white}.secondary{background:#ebe5d8}.icon{background:var(--ink);color:white;font-size:2rem;line-height:1}button:disabled{opacity:.42}@media(max-width:680px){.controls{grid-template-columns:48px 1fr 1fr 48px}#explain{grid-column:2/4}.viewer{padding:14px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><p class="deck" id="deckTitle"></p><h1 class="title" id="qTitle"></h1></div><div class="toolbar"><label class="picker">問題 <select id="select"></select></label><div class="progress"><span id="cur">0</span>/<span id="total">0</span></div></div></header>
<section class="viewer"><div class="meta"><span class="badge" id="subject"></span><span class="muted" id="mode"></span></div><div class="stack" id="content"></div><div class="panel" id="hintPanel" hidden><div class="panel-title">ヒント</div><div class="stack" id="hint"></div></div><div class="panel" id="expPanel" hidden><div class="panel-title">解説</div><div class="stack" id="exp"></div></div></section>
<nav class="controls"><button class="icon" id="prev">‹</button><button class="secondary" id="hintBtn">ヒント</button><button class="primary" id="answerBtn">解答へ</button><button class="secondary" id="explain">解説</button><button class="icon" id="next">›</button></nav>
</main>
<script>
const deck={title:'小学4年生 算数 わり算の筆算',questions:[
{id:'q1',title:'筆算のあなうめ 45 ÷ 6',subject:'算数・わり算の筆算',prompt:[{type:'text',value:'わり算の筆算をしました。□にあてはまる数を書きましょう。'},{type:'figure',kind:'45'}],hints:[{type:'text',value:'まず、42が何を表しているか考えます。'},{type:'math',value:'42 = 6 × 7'},{type:'text',value:'あまりの3は、45から42をひいて出します。'}],answer:[{type:'math',value:'42 ... 6 × 7\n3  ... 45 - 42'}],explanation:[{type:'text',value:'筆算で下に書く42は、割る数6と商7をかけた数です。'},{type:'math',value:'6 × 7 = 42'},{type:'text',value:'あまりは、割られる数45から42をひいて求めます。'},{type:'math',value:'45 - 42 = 3'}]},
{id:'q2',title:'筆算のあなうめ 64 ÷ 8',subject:'算数・わり算の筆算',prompt:[{type:'text',value:'わり算の筆算をしました。□にあてはまる数を書きましょう。'},{type:'figure',kind:'64'}],hints:[{type:'text',value:'64は、割る数8と商8をかけた数です。'},{type:'math',value:'8 × 8 = 64'},{type:'text',value:'あまり0は、64から64をひいて出ます。'}],answer:[{type:'math',value:'64 ... 8 × 8\n0  ... 64 - 64'}],explanation:[{type:'text',value:'筆算では、商を立てたあと、割る数と商をかけた数を書きます。'},{type:'math',value:'8 × 8 = 64'},{type:'text',value:'次に、割られる数から64をひきます。'},{type:'math',value:'64 - 64 = 0'},{type:'text',value:'あまりは0なので、64 ÷ 8 はわり切れます。'}]},
{id:'q3',title:'たしかめ算のあなうめ',subject:'算数・わり算のたしかめ',prompt:[{type:'text',value:'□にあてはまる数を書きましょう。'},{type:'math',value:'61 ÷ 9 = 6 あまり 7\n\nこの答えは、\n9 × □ + □ = □\nでたしかめられます。'}],hints:[{type:'text',value:'わり算のたしかめは、割る数、商、あまりを使います。'},{type:'math',value:'割る数 × 商 + あまり = 割られる数'},{type:'text',value:'この問題では、割る数は9、商は6、あまりは7です。'}],answer:[{type:'math',value:'9 × 6 + 7 = 61'}],explanation:[{type:'text',value:'あまりのあるわり算は、次の形でたしかめます。'},{type:'math',value:'割る数 × 商 + あまり = 割られる数'},{type:'text',value:'61 ÷ 9 = 6 あまり 7 なので、9、6、7をあてはめます。'},{type:'math',value:'9 × 6 + 7 = 54 + 7 = 61'},{type:'text',value:'もとの数61になったので、答えは正しいとたしかめられます。'}]},
{id:'q4',title:'チョコレートを分ける問題',subject:'算数・わり算の文章題',prompt:[{type:'text',value:'27このチョコレートを一皿に3こずつ分けます。皿は何まいいるでしょうか。\n\nかならず筆算と、たしかめも書きましょう。'}],hints:[{type:'text',value:'全部のチョコレートの数を、一皿に入れる数でわります。'},{type:'math',value:'27 ÷ 3'},{type:'text',value:'たしかめは、3に答えをかけて27になるかを見ます。'}],answer:[{type:'math',value:'27 ÷ 3 = 9'},{type:'text',value:'答え：9まい'},{type:'math',value:'たしかめ：3 × 9 = 27'}],explanation:[{type:'text',value:'一皿に3こずつ分けるので、27この中に3こ組がいくつできるかを考えます。'},{type:'math',value:'27 ÷ 3 = 9'},{type:'text',value:'3こ入りの皿が9まいできます。'},{type:'math',value:'3 × 9 = 27'},{type:'text',value:'たしかめで元の27こに戻るので、答えは9まいです。'}]},
{id:'q5',title:'あめを7人に分ける問題',subject:'算数・わり算の文章題',prompt:[{type:'text',value:'65このあめがあります。同じ数ずつ7人に分けます。\n\n1人分は何こになるでしょうか。また、あまりはいくつでしょうか。\n\nかならず筆算と、たしかめも書きましょう。'}],hints:[{type:'text',value:'65このあめを7人に同じ数ずつ分けるので、65 ÷ 7 を計算します。'},{type:'math',value:'7 × 9 = 63\n7 × 10 = 70'},{type:'text',value:'70は65をこえるので、1人分は9こまでです。'}],answer:[{type:'math',value:'65 ÷ 7 = 9 あまり 2'},{type:'text',value:'答え：1人分は9こ、あまりは2こ'},{type:'math',value:'たしかめ：7 × 9 + 2 = 65'}],explanation:[{type:'text',value:'7人に同じ数ずつ分けるので、65 ÷ 7 を計算します。'},{type:'math',value:'7 × 9 = 63\n65 - 63 = 2'},{type:'text',value:'1人に9こずつ配ると63こ使い、2こあまります。'},{type:'math',value:'7 × 9 + 2 = 65'},{type:'text',value:'たしかめで元の65こに戻るので、答えは1人分9こ、あまり2こです。'}]}
]};
let i=0,showAnswer=false,showHint=false,showExp=false;const $=id=>document.getElementById(id);function has(a){return Array.isArray(a)&&a.length}function figure(kind){const is45=kind==='45',a=is45?'6':'8',b=is45?'45':'64',q=is45?'7':'8',p=is45?'42':'64',r=is45?'3':'0';return `<svg class="figure" viewBox="0 0 760 520" role="img"><rect width="760" height="520" fill="white"/><g fill="#222" stroke="#222" stroke-width="5" stroke-linecap="round" font-family="serif" font-size="78"><text x="270" y="90">${q}</text><path d="M160 126H340"/><path d="M160 126q-55 0-55 72" fill="none"/><text x="70" y="210">${a})</text><text x="190" y="210">${b[0]}</text><text x="275" y="210">${b[1]}</text><text x="225" y="315">${p[0]}</text><text x="310" y="315">${p[1]}</text><path d="M180 340H350"/><text x="300" y="430">${r}</text><text x="365" y="305">...</text><text x="365" y="410">...</text><rect x="465" y="235" width="82" height="82" fill="none"/><text x="562" y="300">×</text><rect x="640" y="235" width="82" height="82" fill="none"/><rect x="465" y="345" width="82" height="82" fill="none"/><text x="562" y="410">−</text><rect x="640" y="345" width="82" height="82" fill="none"/></g></svg>`}function draw(el,blocks){el.replaceChildren();for(const b of blocks||[]){let n;if(b.type==='figure'){const wrap=document.createElement('div');wrap.innerHTML=figure(b.kind);el.append(wrap.firstChild);const c=document.createElement('p');c.className='caption';c.textContent='元の問題集の筆算部分をアプリ用に画像表示しています。';el.append(c);continue}if(b.type==='image'){n=document.createElement('img');n.className='figure';n.src=b.src;n.alt=b.alt||''}else{n=document.createElement(b.type==='math'?'div':'p');n.className=b.type==='math'?'math':'text';n.textContent=b.value||''}el.append(n)}}function render(){const q=deck.questions[i];$('deckTitle').textContent=deck.title;$('qTitle').textContent=q.title;$('cur').textContent=i+1;$('total').textContent=deck.questions.length;$('subject').textContent=q.subject;$('mode').textContent=showAnswer?'解答':'問題';$('select').replaceChildren(...deck.questions.map((q,idx)=>{const o=document.createElement('option');o.value=idx;o.textContent=(idx+1)+'. '+q.title;return o}));$('select').value=i;draw($('content'),showAnswer?q.answer:q.prompt);draw($('hint'),q.hints);draw($('exp'),q.explanation);$('hintPanel').hidden=!showHint;$('expPanel').hidden=!showExp;$('prev').disabled=i===0;$('next').disabled=i===deck.questions.length-1;$('hintBtn').disabled=!has(q.hints)||showAnswer;$('explain').disabled=!has(q.explanation);$('answerBtn').textContent=showAnswer?'問題へ':'解答へ';$('hintBtn').textContent=showHint?'ヒントを隠す':'ヒント';$('explain').textContent=showExp?'解説を隠す':'解説'}$('prev').onclick=()=>{if(i>0){i--;showAnswer=showHint=showExp=false;render()}};$('next').onclick=()=>{if(i<deck.questions.length-1){i++;showAnswer=showHint=showExp=false;render()}};$('hintBtn').onclick=()=>{showHint=!showHint;render()};$('answerBtn').onclick=()=>{showAnswer=!showAnswer;showHint=showExp=false;render()};$('explain').onclick=()=>{if(!showAnswer){showAnswer=true;showHint=false}showExp=!showExp;render()};$('select').onchange=e=>{i=Number(e.target.value);showAnswer=showHint=showExp=false;render()};render();
</script>
</body>
</html>
