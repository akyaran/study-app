<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ページ復習アプリ</title>
    <link rel="stylesheet" href="styles.css?v=20260614-page-review-1">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Page Review</p>
        <h1>ページ復習</h1>
      </div>
      <div class="header-actions">
        <label>
          カテゴリ
          <select id="categorySelect"></select>
        </label>
        <label>
          モード
          <select id="modeSelect">
            <option value="review">復習優先</option>
            <option value="sequential">順番</option>
          </select>
        </label>
        <button type="button" id="homeButton">ページ一覧</button>
        <button type="button" id="exportButton">記録保存</button>
        <label class="file-button">
          記録復元
          <input type="file" id="importInput" accept="application/json,.json">
        </label>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel summary-panel">
        <div>
          <span>ページ</span>
          <strong id="pageCount">0</strong>
        </div>
        <div>
          <span>小問</span>
          <strong id="itemCount">0</strong>
        </div>
        <div>
          <span>間違いあり</span>
          <strong id="wrongCount">0</strong>
        </div>
        <div>
          <span>今日の記録</span>
          <strong id="todayCount">0</strong>
        </div>
      </section>

      <section id="listView" class="panel page-list-panel">
        <div class="section-heading">
          <h2>ページ一覧</h2>
          <button type="button" id="startButton">おすすめから始める</button>
        </div>
        <div id="pageList" class="page-list"></div>
      </section>

      <section id="studyView" class="study-layout" hidden>
        <section class="panel study-panel">
          <div class="study-top">
            <div>
              <p class="eyebrow" id="studyCategory"></p>
              <h2 id="studyTitle"></h2>
              <p id="studySource" class="muted"></p>
            </div>
            <div class="study-actions">
              <button type="button" id="prevButton">前へ</button>
              <button type="button" id="nextButton">次へ</button>
            </div>
          </div>

          <div class="target-box">
            <h3>今回やる小問</h3>
            <div id="targetItems" class="target-items"></div>
          </div>

          <figure class="page-figure">
            <img id="pageImage" alt="">
            <figcaption id="pageCaption"></figcaption>
          </figure>

          <div class="primary-actions">
            <button type="button" id="showAnswerButton">解答確認へ</button>
          </div>
        </section>

        <aside class="panel side-panel">
          <h2>ページ内の小問</h2>
          <div id="sideItems" class="side-items"></div>
        </aside>
      </section>

      <section id="answerView" class="panel answer-panel" hidden>
        <div class="section-heading">
          <h2>小問ごとのチェック</h2>
          <button type="button" id="backToProblemButton">問題へ戻る</button>
        </div>
        <p class="muted answer-note">紙に書いた答えを見ながら、小問ごとに正解・不正解を付けてください。不正解にした小問は、復習優先で出やすくなります。</p>
        <div id="answerItems" class="answer-items"></div>
      </section>

      <section class="panel history-panel">
        <div class="section-heading">
          <h2>今日の履歴</h2>
          <button type="button" id="clearTodayButton">今日の表示をクリア</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="pages-data.js?v=20260614-page-review-1"></script>
    <script src="app.js?v=20260614-page-review-1"></script>
  </body>
</html>
